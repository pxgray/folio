<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — Folio</title>
  <link rel="stylesheet" href="/-/static/pico.min.css">
  <link rel="stylesheet" href="/-/static/style.css">
</head>
<body class="dashboard">
  <div class="dash-layout">
    <nav class="dash-sidebar">
      <div class="sidebar-brand">Folio</div>
      <div class="sidebar-nav">
        <span class="sidebar-nav-label">Dashboard</span>
        <a href="/-/dashboard/">Repos</a>
        <a href="/-/dashboard/settings">Settings</a>
        {{if .IsAdmin}}
        <span class="sidebar-nav-label">Admin</span>
        <a href="/-/dashboard/admin/">Users</a>
        <a href="/-/dashboard/admin/settings">Settings</a>
        {{end}}
      </div>
    </nav>
    <main class="dash-main">
      {{if .Flash}}<div role="alert" class="flash">{{.Flash}}</div>{{end}}
      {{block "content" .}}{{end}}
    </main>
  </div>
  <script src="/-/static/folio.js"></script>
</body>
</html>
