{{define "content"}}
<div class="dashboard-page">
  <div class="dashboard-page-header">
    <h1>Repos</h1>
    <a href="/-/dashboard/repos/new" class="btn btn-primary">Add Repo</a>
  </div>

  {{if .Repos}}
  <table class="dashboard-table">
    <thead>
      <tr><th>Repo</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {{range .Repos}}
      <tr>
        <td>{{.Host}}/{{.RepoOwner}}/{{.RepoName}}</td>
        <td><span class="badge badge-{{.Status}}">{{.Status}}</span></td>
        <td>
          <div class="row-actions">
            <a href="/-/dashboard/repos/{{.ID}}" class="btn-icon" title="Edit" aria-label="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            </a>
            <form method="post" action="/-/dashboard/repos/{{.ID}}/sync">
              <input type="hidden" name="_csrf" value="{{$.CSRFToken}}">
              <button type="submit" class="btn-icon" title="Sync" aria-label="Sync">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              </button>
            </form>
            <form method="post" action="/-/dashboard/repos/{{.ID}}/delete">
              <input type="hidden" name="_csrf" value="{{$.CSRFToken}}">
              <button type="submit" class="btn-icon btn-icon-danger" title="Delete" aria-label="Delete" onclick="return confirm('Delete this repo?')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </form>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
  {{else}}
  <p class="empty-state">No repos yet. <a href="/-/dashboard/repos/new">Add one.</a></p>
  {{end}}
</div>
{{end}}
