version: "3"

vars:
  BINARY: folio
  CMD: ./cmd/folio
  BIN_DIR: bin

tasks:
  build:
    desc: Build the folio binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/{{.BINARY}} {{.CMD}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BIN_DIR}}/{{.BINARY}}"

  run:
    desc: Build and run the server (usage: task run -- folio.toml)
    deps: [build]
    cmds:
      - "{{.BIN_DIR}}/{{.BINARY}} {{.CLI_ARGS}}"

  test:
    desc: Run all tests
    cmds:
      - go test ./... -timeout 60s

  test:watch:
    desc: Run tests in watch mode (requires entr — brew/apt install entr)
    cmds:
      - find . -name "*.go" | entr -c go test ./... -timeout 60s

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Run fmt, vet, and tests
    cmds:
      - task: fmt
      - task: vet
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy
